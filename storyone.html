<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layer One</title>

  <link rel="icon" type="image/png" href="hearticon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Federo&family=Ribeye&family=Yrsa:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">

  <style>

    *{
      box-sizing:border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;

      background:
      radial-gradient(circle at top, rgba(151, 207, 255, 0.5), transparent 35%),
      linear-gradient(180deg, #dff3ff 0%, #cbe7ff 35%, #b7ddff 100%);

      font-family: "Federo", sans-serif;
      color: #163b63;
      position: relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
      radial-gradient(rgba(255,255,255,0.7) 2px, transparent 2px);
      background-size:40px 40px;
      opacity:0.4;
      animation: floatBG 30s linear infinite;
    }
body::-webkit-scrollbar {
  width: 0px;
}
    @keyframes floatBG{
      from{
        transform:translateY(0px);
      }
      to{
        transform:translateY(40px);
      }
    }

   h1 {
  margin-top: 18px;

  text-align: center;

  font-family: "Yrsa", serif;
  font-weight: 500;

  font-size: 42px;

  letter-spacing: 2px;

  color: #24507d;

  text-shadow:
  0 2px 0 #ffffff,
  0 0 18px rgba(255,255,255,0.7);
}

   .main-img {
  width: 240px;
  display: block;
  margin: 0 auto 12px auto;

  filter: drop-shadow(0 15px 25px rgba(34, 90, 146, 0.25));

  animation: floatImage 4s ease-in-out infinite;
}

    @keyframes floatImage{
      0%{ transform:translateY(0px);}
      50%{ transform:translateY(-8px);}
      100%{ transform:translateY(0px);}
    }

    .button-container {
      text-align: center;
      margin: 20px;
    }

    .earnMoreBtn {
      background: linear-gradient(180deg, #7dc8ff 0%, #5aaef5 100%);
      border: 2px solid #ffffff;
      border-bottom: 5px solid #2c6fae;
      border-radius: 18px;
      color: white;
      font-size: 18px;
      padding: 12px 22px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin: 0 10px;
      font-family: "Federo", sans-serif;
      box-shadow:
      0 8px 20px rgba(67, 145, 255, 0.35),
      inset 0 2px 0 rgba(255,255,255,0.5);
    }

    .earnMoreBtn:hover {
      transform: translateY(-3px) scale(1.03);
      background: linear-gradient(180deg, #92d5ff 0%, #66baff 100%);
    }

    .earnMoreBtn:active {
      transform: translateY(2px);
      border-bottom-width: 2px;
    }

    #notEnough {
      color: #d43c6b;
      font-weight: bold;
      margin-top: 15px;
      display: none;
      font-size: 17px;
    }

    .loading {
      font-size: 24px;
      margin-top: 25px;
      text-align: center;
      animation: pulse 1s infinite;
      color: #35679c;
      font-family: "Ribeye", serif;
    }

    @keyframes pulse {
      0% { opacity: 0.3; transform:scale(0.95);}
      50% { opacity: 1; transform:scale(1);}
      100% { opacity: 0.3; transform:scale(0.95);}
    }

   .boxes {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;

  margin-top: 20px;
  padding: 10px 20px 40px 20px;

  min-height: 340px;

  align-items: flex-start;
}
   

    .card {
 width: 230px;
      height: 230px;

  perspective: 1200px;
  position: relative;
  z-index: 1;

  transition: transform 0.2s ease;
}

    .card:hover{
      transform: translateY(-6px);
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.85s;
      transform-style: preserve-3d;
      border-radius: 22px;
      cursor: pointer;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
.card-back {
  position: absolute;

  inset: 0;

  width: 100%;
  height: 100%;

  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;

  border-radius: 22px;
  overflow: hidden;
}

    .card-front {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid rgba(255,255,255,0.7);
      box-shadow:
      0 10px 25px rgba(18, 70, 120, 0.18),
      inset 0 0 40px rgba(255,255,255,0.15);
      position: relative;
    }

    .card-front::before{
      content:"✦";
      position:absolute;
      top:14px;
      right:16px;
      font-size:22px;
      color:rgba(255,255,255,0.7);
    }

    .card-front::after{
      content:"TAP TO OPEN";
      position:absolute;
      bottom:18px;
      font-size:14px;
      letter-spacing:2px;
      color:white;
      opacity:0.8;
    }

    .card-back {
  background: linear-gradient(180deg, #f6fbff 0%, #dbeeff 100%);
  transform: rotateY(180deg);

  display: flex;
  align-items: center;
  justify-content: center;

  border: 4px solid rgba(255,255,255,0.9);

  box-shadow:
  0 12px 30px rgba(24, 77, 128, 0.25);

  position: absolute;
  top: 0;
  left: 0;
}

    .card-back img {
      max-width: 100%;
      max-height: 100%;
      transition: transform 0.3s ease;
      position: relative;
      z-index: 1;
      object-fit: cover;
    }

    .card:hover .card-back img {
      transform: scale(1.08);
    }

    .blue {
      background:
      linear-gradient(145deg, #6ebdff 0%, #3e8fff 100%);
    }

    .yellow {
      background:
      linear-gradient(145deg, #ffe785 0%, #f8c92e 100%);
    }

    .purple {
      background:
      linear-gradient(145deg, #c38cff 0%, #8d4fff 100%);
    }

    .card.glow-blue {
      box-shadow: 0 0 25px rgba(63, 142, 252, 0.85);
    }

    .card.glow-yellow {
      box-shadow: 0 0 28px rgba(249, 204, 47, 0.85);
    }

    .card.glow-purple {
      box-shadow: 0 0 30px rgba(168, 95, 240, 0.95);
    }

    .animate-glow {
      animation: glowBase 1s ease forwards;
    }

    @keyframes glowBase {
      0% { transform: scale(1); }
      50% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    #collectionStatus {
      position: fixed;
      top: 15px;
      right: 15px;

      width: 240px;
      max-height: 40vh;
      overflow-y: auto;

      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(14px);

      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 22px;

      padding: 16px;

      box-shadow:
      0 15px 35px rgba(33, 90, 140, 0.18);

      font-family: "Ribeye", serif;
      z-index: 1000;
    }

    #collectionStatus::-webkit-scrollbar{
      width:8px;
    }

    #collectionStatus::-webkit-scrollbar-thumb{
      background:#8ec9ff;
      border-radius:20px;
    }

    .collection-title{
      font-size:20px;
      margin-bottom:10px;
      color:#24507d;
      text-align:center;
    }

    .collection-list{
      list-style:none;
      padding:0;
      margin:0;
    }

    .collection-list li{
      background:rgba(255,255,255,0.5);
      margin-bottom:8px;
      padding:8px 10px;
      border-radius:12px;
      transition:0.2s ease;
      font-size:14px;
    }

    .collection-list li:hover{
      transform:translateX(3px);
    }

    .uncollected {
      opacity:0.45;
    }

    .progress-wrapper{
      margin-top:14px;
    }

    .progress-bar {
      height: 14px;
      background: rgba(176, 212, 241, 0.5);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background:
      linear-gradient(90deg, #63b7ff 0%, #8fcbff 100%);
      transition: width 0.5s ease-in-out;
      border-radius:999px;
    }

    .progress-text{
      font-size:13px;
      text-align:center;
      color:#35679c;
    }

    #cookieGame {
      position: fixed;
      top: 15px;
      left: 15px;

      width: 350px;

      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(14px);

      border-radius: 24px;
      border: 2px solid rgba(255,255,255,0.7);

      padding: 18px;

      box-shadow:
      0 15px 35px rgba(33, 90, 140, 0.18);

      z-index:1000;
    }

    #cookieGame h2 {
      margin: 0;
      font-size: 28px;
      text-align:center;
      color:#2f6293;
      font-family: "Ribeye", serif;
    }

    .cookietext{
      text-align:center;
      color:#35679c;
      margin:6px 0;
      font-size:16px;
    }

    #cookieGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      justify-content: center;
      margin-top:16px;
    }

    .cookie {
      width: 95px;
      height: 95px;

      background-image: url('bettercookie.png');
      background-size: cover;
      background-position:center;

      border-radius: 50%;
      cursor: pointer;
      position: relative;

      transition: all 0.25s ease;

      border:3px solid rgba(255,255,255,0.85);

      box-shadow:
      0 8px 18px rgba(29, 84, 135, 0.18);
    }

    .cookie:hover{
      transform: translateY(-4px) rotate(3deg);
    }

    .cookie.clicked {
      box-shadow:
      0 0 18px 6px rgba(255, 226, 116, 0.9);
      transform: scale(1.08);
    }

    .cookie .reward {
      position: absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;

      color: white;
      font-weight: bold;
      font-size: 24px;

      display: none;

      text-shadow:0 2px 6px rgba(0,0,0,0.4);
    }

    @media(max-width:1100px){

      #cookieGame{
        position:relative;
        margin:20px auto;
        left:auto;
        top:auto;
      }

      #collectionStatus{
        position:relative;
        margin:20px auto;
        top:auto;
        right:auto;
        width:350px;
      }

      h1{
        margin-top:20px;
      }
    }

  </style>
</head>
<body>

  <div id="cookieGame">
    <h2>Cookie Bonus</h2>

    <div id="countdown">
      <p class="cookietext">Time left: 30s</p>
    </div>

    <div id="cookieGrid"></div>

    <p class="cookietext">
      Coins: <span id="coinDisplay">0</span>
    </p>
  </div>

  <div id="collectionStatus"></div>

  <h1 id="title">Layer 1</h1>

  <img src="main.png" alt="Main" class="main-img" />

  <div class="button-container">
    <button class="earnMoreBtn" onclick="doPull(1)">
      ✦ 1 Pull
    </button>

    <button class="earnMoreBtn" onclick="doPull(5)">
      ✦ 5 Pull
    </button>

    <div id="notEnough">
      You don't have enough coins!
    </div>
  </div>

  <div id="loading" class="loading" style="display: none;">
    Opening Capsules...
  </div>

  <div class="boxes" id="resultContainer"></div>

  <audio id="flipSound" src="click.mp3"></audio>

<script>

const items = [
  { name: 'Mika', rarity: '4', image: 'mika.png' },
  { name: 'Shoya', rarity: '4', image: 'shoya.png' },
  { name: 'Melanie', rarity: '4', image: 'mel.png' },
  { name: 'Damian', rarity: '4', image: 'damain.png' },
  { name: 'Matt', rarity: '4', image: 'matt.png' },
  { name: 'Susurri', rarity: '4', image: 'susup.jpg' },
  { name: 'Stella', rarity: '4', image: 'stellaup.PNG' },

  { name: 'Yumiko', rarity: '5', image: 'yum.png' },
  { name: 'Aiko', rarity: '5', image: 'aikoup.jpg' },
  { name: 'Luna', rarity: '5', image: 'luna.png' },
  { name: 'Hyun', rarity: '5', image: 'hyun.png' },
  { name: 'Moon', rarity: '5', image: 'moon.png' },
  { name: 'Vivian', rarity: '5', image: 'vivian.png' },

  { name: 'Andrew', rarity: 'secret', image: 'andrew.png' }
];

let coinCount = 10;

const COOKIE_REWARDS = [1, 1, 5, 5, 5, 10];

let cookiesClickable = true;
let countdown = 20;
let countdownInterval;

const coinDisplay = document.getElementById('coinDisplay');
const cookieGrid = document.getElementById('cookieGrid');
const countdownDisplay = document.getElementById('countdown');
const notEnoughMsg = document.getElementById('notEnough');

function updateCoinDisplay() {
  coinDisplay.textContent = coinCount;
}

function createCookies() {

  clearInterval(countdownInterval);

  cookieGrid.innerHTML = '';

  const shuffled = [...COOKIE_REWARDS].sort(() => Math.random() - 0.5);

  shuffled.forEach(reward => {

    const div = document.createElement('div');
    div.className = 'cookie';

    const label = document.createElement('div');
    label.className = 'reward';
    label.textContent = `+${reward}`;

    div.appendChild(label);
    cookieGrid.appendChild(div);

    div.addEventListener('click', () => {

      if (!cookiesClickable) return;

      cookiesClickable = false;

      div.classList.add('clicked');

      label.style.display = 'flex';

      coinCount += reward;

      updateCoinDisplay();

      [...cookieGrid.children].forEach(c => {
        const l = c.querySelector('.reward');
        l.style.display = 'flex';
      });

      countdown = 30;

      countdownDisplay.innerHTML =
      `<p class="cookietext">Time left: ${countdown}s</p>`;

      countdownInterval = setInterval(() => {

        countdown--;

        countdownDisplay.innerHTML =
        `<p class="cookietext">Time left: ${countdown}s</p>`;

        if (countdown <= 0) {

          clearInterval(countdownInterval);

          cookiesClickable = true;

          createCookies();
        }

      }, 1000);

    });

  });

}

createCookies();
updateCoinDisplay();

const collection = {};

items.forEach(item => collection[item.name] = 0);

function updateCollectionDisplay() {

  const container = document.getElementById('collectionStatus');

  let collectedCount = 0;

  let content = `
  <div class="collection-title">Collection</div>
  <ul class="collection-list">
  `;

  items.forEach(item => {

    const count = collection[item.name];

    const owned = count > 0;

    if (owned) collectedCount++;

    content += `
    <li class="${owned ? '' : 'uncollected'}">
      ✦ ${item.name}
      ${count > 1 ? ' x' + count : ''}
    </li>
    `;
  });

  content += '</ul>';

  const progressPercent = (collectedCount / items.length) * 100;

  content += `
  <div class="progress-wrapper">
    <div class="progress-text">
      ${collectedCount}/${items.length} Collected
    </div>

    <div class="progress-bar">
      <div class="progress-bar-fill"
      style="width:${progressPercent}%"></div>
    </div>
  </div>
  `;

  container.innerHTML = content;
}

updateCollectionDisplay();

function getRandomItem() {

  const roll = Math.random();

  if (roll < 0.75) {

    return items
    .filter(i => i.rarity === '4')
    [Math.floor(Math.random() * 7)];

  }

  if (roll < 0.95) {

    return items
    .filter(i => i.rarity === '5')
    [Math.floor(Math.random() * 6)];

  }

  return items.find(i => i.rarity === 'secret');
}

function doPull(count) {

  if (coinCount < count) {

    notEnoughMsg.style.display = 'block';

    setTimeout(() => {
      notEnoughMsg.style.display = 'none';
    }, 2000);

    return;
  }

  coinCount -= count;

  updateCoinDisplay();

  const container = document.getElementById('resultContainer');
  const loader = document.getElementById('loading');

  container.innerHTML = '';

  loader.style.display = 'block';

  setTimeout(() => {

    loader.style.display = 'none';

    for (let i = 0; i < count; i++) {

      const item = getRandomItem();

      const card = document.createElement('div');
      card.className = 'card';

      const cardInner = document.createElement('div');
      cardInner.className = 'card-inner';

      const cardFront = document.createElement('div');

      cardFront.className =
      'card-front ' +
      (item.rarity === '4'
      ? 'blue'
      : item.rarity === '5'
      ? 'yellow'
      : 'purple');

      const cardBack = document.createElement('div');
      cardBack.className = 'card-back';

      const img = document.createElement('img');

      img.src = item.image;
      img.alt = item.name;
      img.title = item.name;

      cardBack.appendChild(img);

      cardInner.appendChild(cardFront);
      cardInner.appendChild(cardBack);

      card.appendChild(cardInner);

      card.addEventListener('click', () => {

        if (card.classList.contains('flipped')) return;

        card.classList.add('flipped');

        if (item.rarity === '4') {
          card.classList.add('glow-blue');
        }

        else if (item.rarity === '5') {
          card.classList.add('glow-yellow');
        }

        else if (item.rarity === 'secret') {
          card.classList.add('glow-purple');
        }

        card.classList.add('animate-glow');

        const sound = document.getElementById('flipSound');

        sound.currentTime = 0;

        sound.play();

        collection[item.name]++;

        updateCollectionDisplay();

      });

      container.appendChild(card);
    }

  }, 1500);

}

</script>

</body>
</html>
