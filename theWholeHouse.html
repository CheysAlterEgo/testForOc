<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Whole Cast</title>

  <link rel="icon" type="image/png" href="hearticon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Federo&family=Ribeye&family=Yrsa:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">

  <style>

    *{
      box-sizing:border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;

      background:
     radial-gradient(circle at top, rgba(228, 124, 148, 0.5), transparent 35%),
linear-gradient(180deg, #F1B6C4 0%, #EC9CAF 35%, #EC9CAF 100%);

      font-family: "Federo", sans-serif;
      color: #81225C;
      position: relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
      radial-gradient(rgba(255,255,255,0.7) 2px, transparent 2px);
      background-size:40px 40px;
      opacity:0.4;
      animation: floatBG 30s linear infinite;
    }
body::-webkit-scrollbar {
  width: 0px;
}
    @keyframes floatBG{
      from{
        transform:translateY(0px);
      }
      to{
        transform:translateY(40px);
      }
    }

   h1 {
  margin-top: 18px;

  text-align: center;

  font-family: "Yrsa", serif;
  font-weight: 500;

  font-size: 42px;

  letter-spacing: 2px;

  color: #81225C;

  text-shadow:
  0 2px 0 #ffffff,
  0 0 18px rgba(255,255,255,0.7);
}

   .main-img {
  width: 240px;
  display: block;
  margin: 0 auto 12px auto;

  filter: drop-shadow(0 15px 25px rgba(34, 90, 146, 0.25));

  animation: floatImage 4s ease-in-out infinite;
}

    @keyframes floatImage{
      0%{ transform:translateY(0px);}
      50%{ transform:translateY(-8px);}
      100%{ transform:translateY(0px);}
    }

    .button-container {
      text-align: center;
      margin: 20px;
    }

    .earnMoreBtn {
      background: linear-gradient(180deg, #E288A8 0%, #ECB1C6 100%);
      border: 2px solid #ffffff;
      border-bottom: 5px solid #D37898;
      border-radius: 18px;
      color: white;
      font-size: 18px;
      padding: 12px 22px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin: 0 10px;
      font-family: "Federo", sans-serif;
      box-shadow:
      0 8px 20px rgba(230, 153, 180, 0.35),
inset 0 2px 0 rgba(255, 255, 255, 0.5);
    }

    .earnMoreBtn:hover {
      transform: translateY(-3px) scale(1.03);
      background: linear-gradient(180deg, #E699B4 0%, #F2CAD8 100%);
    }

    .earnMoreBtn:active {
      transform: translateY(2px);
      border-bottom-width: 2px;
    }

    #notEnough {
      color: #d43c6b;
      font-weight: bold;
      margin-top: 15px;
      display: none;
      font-size: 17px;
    }

    .loading {
      font-size: 24px;
      margin-top: 25px;
      text-align: center;
      animation: pulse 1s infinite;
      color: #163b63;
      font-family: "Ribeye", serif;
    }

    @keyframes pulse {
      0% { opacity: 0.3; transform:scale(0.95);}
      50% { opacity: 1; transform:scale(1);}
      100% { opacity: 0.3; transform:scale(0.95);}
    }

   .boxes {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;

  margin-top: 20px;
  padding: 10px 20px 40px 20px;

  min-height: 340px;

  align-items: flex-start;
}
   

    .card {
width: 250px;
      height: 250px;

  perspective: 1200px;
  position: relative;
  z-index: 1;

  transition: transform 0.2s ease;
}

    .card:hover{
      transform: translateY(-6px);
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.85s;
      transform-style: preserve-3d;
      border-radius: 22px;
      cursor: pointer;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
.card-back {
  position: absolute;

  inset: 0;

  width: 100%;
  height: 100%;

  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;

  border-radius: 22px;
  overflow: hidden;
}

    .card-front {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid rgba(255,255,255,0.7);
      box-shadow:
      0 10px 25px rgba(18, 70, 120, 0.18),
      inset 0 0 40px rgba(255,255,255,0.15);
      position: relative;
    }

    .card-front::before{
      content:"✦";
      position:absolute;
      top:14px;
      right:16px;
      font-size:22px;
      color:rgba(255,255,255,0.7);
    }

    .card-front::after{
      content:"TAP TO OPEN";
      position:absolute;
      bottom:18px;
      font-size:14px;
      letter-spacing:2px;
      color:white;
      opacity:0.8;
    }

    .card-back {
  background: linear-gradient(180deg, #f6fbff 0%, #dbeeff 100%);
  transform: rotateY(180deg);

  display: flex;
  align-items: center;
  justify-content: center;

  border: 4px solid rgba(255,255,255,0.9);

  box-shadow:
  0 12px 30px rgba(24, 77, 128, 0.25);

  position: absolute;
  top: 0;
  left: 0;
}

    .card-back img {
      max-width: 100%;
      max-height: 100%;
      transition: transform 0.3s ease;
      position: relative;
      z-index: 1;
      object-fit: cover;
    }

    .card:hover .card-back img {
      transform: scale(1.08);
    }

    .blue {
      background:
      linear-gradient(145deg, #6ebdff 0%, #3e8fff 100%);
    }

    .yellow {
      background:
      linear-gradient(145deg, #ffe785 0%, #f8c92e 100%);
    }

    .purple {
      background:
      linear-gradient(145deg, #c38cff 0%, #8d4fff 100%);
    }

    .card.glow-blue {
      box-shadow: 0 0 25px rgba(63, 142, 252, 0.85);
    }

    .card.glow-yellow {
      box-shadow: 0 0 28px rgba(249, 204, 47, 0.85);
    }

    .card.glow-purple {
      box-shadow: 0 0 30px rgba(168, 95, 240, 0.95);
    }

    .animate-glow {
      animation: glowBase 1s ease forwards;
    }

    @keyframes glowBase {
      0% { transform: scale(1); }
      50% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    #collectionStatus {
      position: fixed;
      top: 15px;
      right: 15px;

      width: 240px;
      max-height: 40vh;
      overflow-y: auto;

      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(14px);

      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 22px;

      padding: 16px;

      box-shadow:
      0 15px 35px rgba(33, 90, 140, 0.18);

      font-family: "Ribeye", serif;
      z-index: 1000;
    }

    #collectionStatus::-webkit-scrollbar{
      width:8px;
    }

    #collectionStatus::-webkit-scrollbar-thumb{
      background:#C7667A;
      border-radius:20px;
    }

    .collection-title{
      font-size:20px;
      margin-bottom:10px;
      color:#81225C;
      text-align:center;
    }

    .collection-list{
      list-style:none;
      padding:0;
      margin:0;
    }

    .collection-list li{
      background:rgba(255,255,255,0.5);
      margin-bottom:8px;
      padding:8px 10px;
      border-radius:12px;
      transition:0.2s ease;
      font-size:14px;
    }

    .collection-list li:hover{
      transform:translateX(3px);
    }

    .uncollected {
      opacity:0.45;
    }

    .progress-wrapper{
      margin-top:14px;
    }

    .progress-bar {
      height: 14px;
      background: rgba(249, 240, 245, 0.5);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background:
      linear-gradient(90deg, #EDBFDA 0%, #E6A3CA 100%);
      transition: width 0.5s ease-in-out;
      border-radius:999px;
    }

    .progress-text{
      font-size:13px;
      text-align:center;
      color:#81225C;
    }

    #snake-container {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 430px;
      height: 375px;
    }
    #snakeScore, #coinDisplay {
     font-family: "Yrsa", serif;
      font-weight: 400;
      text-align: center;
      margin-top: 5px;
      
    }

      h1{
        margin-top:20px;
      }
    }

  </style>
</head>
<body>
<div id="collectionStatus"></div>
  <div id="snake-container">
    <iframe id="snakeIframe" src="snake.html" width="470" height="380" style="border:none;"></iframe>
    <div id="snakeScore">Score: 0</div>
    <div id="coinDisplay">Coins: 10</div>
  </div>

  <h1>The Cast</h1>
  <img src="cookie.png" alt="Main" class="main-img" />

  <div class="button-container">
    <button class="earnMoreBtn" onclick="doPull(1)">
      ✦ 1 Pull
    </button>

    <button class="earnMoreBtn" onclick="doPull(5)">
      ✦ 5 Pull
    </button>

    <div id="notEnough">
      You don't have enough coins!
    </div>
  </div>

  <div id="loading" class="loading" style="display: none;">
    Opening Capsules...
  </div>

  <div class="boxes" id="resultContainer"></div>

  <audio id="flipSound" src="click.mp3"></audio>

<script>
const items = [
  // =========================
  // 4 STARS
  // =========================

  { name: 'Mika', rarity: '4', image: 'mikaup.jpg' },
  { name: 'Shoya', rarity: '4', image: 'shoyaup.jpg' },

  { name: 'Melanie', rarity: '4', image: 'melone.jpg' },

  { name: 'Damian', rarity: '4', image: 'damup.jpg' },
  { name: 'Damian', rarity: '4', image: 'damianp2.png' },

  { name: 'Matt', rarity: '4', image: 'mattup.jpg' },
  { name: 'Susurri', rarity: '4', image: 'susup.jpg' },

  { name: 'Stella', rarity: '4', image: 'stellaup.PNG' },
  { name: 'Stella', rarity: '4', image: 'stellap2.png' },

  { name: 'Nikki', rarity: '4', image: 'nikki.PNG' },
  { name: 'Jamie', rarity: '4', image: 'jamie.png' },
  { name: 'The Twins', rarity: '4', image: 'twins.png' },

  { name: 'Soyul', rarity: '4', image: 'soyulp2.PNG' },
  { name: 'Soyul', rarity: '4', image: 'soyul3.PNG' },

  { name: 'Miran', rarity: '4', image: 'myrrin3.png' },
  { name: 'Viola', rarity: '4', image: 'viola3.PNG' },

  // =========================
  // 5 STARS
  // =========================

  { name: 'Luna', rarity: '5', image: 'lunaup.jpg' },
  { name: 'Luna', rarity: '5', image: 'lunap2.png' },

  { name: 'Aiko', rarity: '5', image: 'aikoup.jpg' },
  { name: 'Aiko', rarity: '5', image: 'aikop2.png' },

  { name: 'Yumiko', rarity: '5', image: 'yumiup.jpg' },
  { name: 'Yumiko', rarity: '5', image: 'yumikop2.PNG' },
  { name: 'Yumiko', rarity: '5', image: 'yumiko4.jpg' },

  { name: 'Hyun', rarity: '5', image: 'hyunup.jpg' },
  { name: 'Moon', rarity: '5', image: 'moon.png' },

  { name: 'Vivian', rarity: '5', image: 'vivian.png' },
  { name: 'Vivian', rarity: '5', image: 'vivianp2.png' },

  { name: 'Vex', rarity: '5', image: 'vexp2.png' },
  { name: 'Vex', rarity: '5', image: 'vex3.png' },

  { name: 'Arma', rarity: '5', image: 'arma.png' },

  { name: 'Melanie', rarity: '5', image: 'melanie.png' },

  { name: 'Celestino De Luca', rarity: '5', image: 'cel3.PNG' },
  { name: 'Anaka', rarity: '5', image: 'anaka3.PNG' },
  { name: 'Deviora', rarity: '5', image: 'deviora.png' },
  { name: 'Kairo', rarity: '5', image: 'kairo3.jpg' },

  { name: 'Chico', rarity: '5', image: 'chico.jpg' },
  { name: 'Naiomi', rarity: '5', image: 'nainai.PNG' },
  { name: 'Marina', rarity: '5', image: 'marinaup.jpg' },
  { name: 'Faris', rarity: '5', image: 'faris.jpg' },
  { name: 'Trixie', rarity: '5', image: 'trixie.PNG' },
  { name: 'Minsu', rarity: '5', image: 'minsu.jpg' },
{ name: 'Augis', rarity: '5', image: 'augis.PNG' },
  { name: 'Rin', rarity: '5', image: 'rin.PNG' },
  // =========================
  // SECRETS
  // =========================

  { name: 'Andrew', rarity: 'secret', image: 'andrew.png' },

  { name: 'Yunsu', rarity: 'secret', image: 'yunsu.png' },
  { name: 'Yunsu', rarity: 'secret', image: 'yunsu3.png' },

  { name: 'Minjung', rarity: 'secret', image: 'minjung.png' },

  { name: 'Lucien', rarity: 'secret', image: 'lucien.PNG' },

  { name: 'Alina', rarity: 'secret', image: 'alina3.png' }
];

let coinCount = 100000000000;

// UNIQUE COLLECTION NAMES
const uniqueNames = [...new Set(items.map(item => item.name))];

// COLLECTION STORAGE
const collection = {};

uniqueNames.forEach(name => {
  collection[name] = 0;
});

function updateCoinDisplay() {
  document.getElementById('coinDisplay').textContent = 'Coins: ' + coinCount;

  const buttons = document.querySelectorAll('.earnMoreBtn');

  buttons.forEach(btn => {
    const cost = parseInt(btn.textContent);
    btn.disabled = coinCount < cost;
  });
}

function updateCollectionDisplay() {
  const container = document.getElementById('collectionStatus');

  let collectedCount = 0;

  let content = `
    <div class="collection-title">Collection</div>

    <ul class="collection-list">
  `;

  // ONLY LOOP UNIQUE NAMES
  uniqueNames.forEach(name => {
    const count = collection[name];
    const owned = count > 0;

    if (owned) {
      collectedCount++;
    }

    content += `
      <li class="${owned ? '' : 'uncollected'}">
        ✦ ${name}
        ${count > 1 ? ' x' + count : ''}
      </li>
    `;
  });

  content += `</ul>`;

  const progressPercent =
    (collectedCount / uniqueNames.length) * 100;

  content += `
    <div class="progress-wrapper">
      <div class="progress-text">
        ${collectedCount}/${uniqueNames.length} Collected
      </div>

      <div class="progress-bar">
        <div
          class="progress-bar-fill"
          style="width:${progressPercent}%">
        </div>
      </div>
    </div>
  `;

  container.innerHTML = content;
}

function getRandomItem() {
  const roll = Math.random();

  const fourStars =
    items.filter(i => i.rarity === '4');

  const fiveStars =
    items.filter(i => i.rarity === '5');

  const secrets =
    items.filter(i => i.rarity === 'secret');

  if (roll < 0.75) {
    return fourStars[
      Math.floor(Math.random() * fourStars.length)
    ];
  }

  if (roll < 0.95) {
    return fiveStars[
      Math.floor(Math.random() * fiveStars.length)
    ];
  }

  return secrets[
    Math.floor(Math.random() * secrets.length)
  ];
}

function doPull(count) {
  if (coinCount < count) {
    document.getElementById('notEnough').style.display = 'block';

    setTimeout(() => {
      document.getElementById('notEnough').style.display = 'none';
    }, 2000);

    return;
  }

  coinCount -= count;

  updateCoinDisplay();

  const container =
    document.getElementById('resultContainer');

  const loader =
    document.getElementById('loading');

  container.innerHTML = '';

  loader.style.display = 'block';

  setTimeout(() => {
    loader.style.display = 'none';

    for (let i = 0; i < count; i++) {
      const item = getRandomItem();

      const card = document.createElement('div');
      card.className = 'card';

      const inner = document.createElement('div');
      inner.className = 'card-inner';

      const front = document.createElement('div');

      front.className =
        'card-front ' +
        (item.rarity === '4'
          ? 'blue'
          : item.rarity === '5'
          ? 'yellow'
          : 'purple');

      const back = document.createElement('div');
      back.className = 'card-back';

      const img = document.createElement('img');

      img.src = item.image;
      img.alt = item.name;
      img.title = item.name;

      back.appendChild(img);

      inner.appendChild(front);
      inner.appendChild(back);

      card.appendChild(inner);

      card.addEventListener('click', () => {
        if (card.classList.contains('flipped')) return;

        card.classList.add('flipped');

        card.classList.add(
          `glow-${
            item.rarity === '4'
              ? 'blue'
              : item.rarity === '5'
              ? 'yellow'
              : 'purple'
          }`
        );

        card.classList.add('animate-glow');

        document.getElementById('flipSound').play();

        // COUNTS ALL VERSIONS TOGETHER
        collection[item.name]++;

        updateCollectionDisplay();
      });

      container.appendChild(card);
    }
  }, 1500);
}

// Snake game score
window.addEventListener('message', event => {
  if (event.data && event.data.type === 'snakeScore') {
    const score = event.data.score;

    document.getElementById('snakeScore').textContent =
      'Snake Score: ' + score;

    coinCount += score;

    updateCoinDisplay();
  }
});

// Initial setup
updateCollectionDisplay();
updateCoinDisplay();
</script>

</body>
</html>
